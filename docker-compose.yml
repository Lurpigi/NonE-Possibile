services:
  yt-search:
    build: .
    image: sabaku-subtitle-searcher:latest
    container_name: sabaku_searcher
    environment:
      CHANNEL_URL:   "https://www.youtube.com/@SabakuNoStreamer"
      SEARCH_PHRASE: "non è possibile"
      LANG_CODE:     "it"
      OUTPUT_DIR:    "/output"
    volumes:
      - ./output:/output
    restart: "no"

# ── USO ──────────────────────────────────────────────────────────────────────
# Prima run (scarica tutto + analizza):
#   docker compose up --build
#
# Run successive (scarica solo nuovi + analizza solo nuovi):
#   docker compose up
#
# Solo analisi (nessun download):
#   docker compose run --rm yt-search --skip-download
#
# Frase diversa senza re-download:
#   docker compose run --rm -e SEARCH_PHRASE="assolutamente no" yt-search --skip-download
